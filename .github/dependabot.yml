version: 2
updates:
  - package-ecosystem: npm # pnpm-lock.yaml 포함
    directory: /
    schedule:
      interval: weekly
      day: sunday
    groups:
      dev-dependencies:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: sunday
    groups:
      actions:
        patterns: ["*"]
