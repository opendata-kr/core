name: release

# 태그(vX.Y.Z) push로만 발행한다. 버전과 태그는 release-please가 관리한다(release-please.yml).
# release-please가 App 토큰으로 만든 태그가 이 워크플로를 트리거한다.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write   # npm OIDC 트러스티드 퍼블리싱과 provenance에 필수

jobs:
  release:
    runs-on: ubuntu-latest   # OIDC는 GitHub-hosted 러너만 지원
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: https://registry.npmjs.org
          cache: false   # 릴리스 빌드에는 캐시를 쓰지 않는다(npm 공식 권고)
      - name: 태그와 package.json 버전 정합 확인
        run: test "v$(node -p "require('./package.json').version")" = "${GITHUB_REF_NAME}"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - run: pnpm verify:package   # tarball에 dist 포함 확인 (dry-run)
      - run: pnpm publish --no-git-checks   # NPM_TOKEN 없음, OIDC로 인증
